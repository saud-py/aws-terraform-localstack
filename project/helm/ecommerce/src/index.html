<!DOCTYPE html>
<html>
<head>
  <title>E-Commerce Cloud Platform</title>
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background: #090d16;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem 0;
    }
    .container {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      max-width: 600px;
      width: 90%;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    h1 {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    p.desc {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .section-title {
      color: #818cf8;
      font-size: 1.1rem;
      margin-bottom: 1rem;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .product-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
      text-align: left;
    }
    .product-card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.3s;
    }
    .product-card:hover {
      border-color: #38bdf8;
    }
    .product-info h4 {
      margin: 0 0 0.25rem 0;
      color: #f8fafc;
    }
    .product-info p {
      margin: 0;
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .product-action {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .quantity-input {
      width: 50px;
      padding: 0.4rem;
      border-radius: 4px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #f8fafc;
      text-align: center;
    }
    .buy-btn {
      padding: 0.5rem 1rem;
      border-radius: 6px;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      color: white;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      transition: transform 0.2s;
    }
    .buy-btn:hover {
      transform: scale(1.05);
    }
    .order-result {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      background: #0f172a;
      border: 1px solid #1e293b;
      display: none;
      text-align: left;
    }
    .order-result h3 {
      margin-top: 0;
      font-size: 1rem;
    }
    pre {
      margin: 0;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.8rem;
      overflow-x: auto;
      color: #38bdf8;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #818cf8;
      color: #818cf8;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.3s;
    }
    .btn-secondary:hover {
      background: rgba(129, 140, 248, 0.1);
    }
    .btn-danger {
      background: #ef4444;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
      width: 100%;
      margin-top: 0.5rem;
    }
    .btn-danger:hover {
      background: #dc2626;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cloud E-Commerce</h1>
    <p class="desc">LocalStack & Minikube Event-Driven Architecture Platform</p>
    
    <div class="section-title">
      <span>Product Catalog</span>
      <button class="btn-secondary" onclick="fetchProducts()">Refresh Catalog</button>
    </div>
    
    <div class="product-grid" id="product-list">
      <p style="color: #94a3b8; font-size: 0.9rem;">Loading products...</p>
    </div>
    
    <div class="order-result" id="result-box">
      <h3 id="result-title">Order Status</h3>
      <pre id="result-data"></pre>
    </div>

    <div style="margin-top: 2rem;">
      <div class="section-title">
        <span>Transaction Ledger</span>
        <button class="btn-secondary" onclick="fetchTransactions()">Refresh Ledger</button>
      </div>
      <div id="tx-list" style="text-align: left; font-size: 0.9rem; color: #94a3b8; overflow-x: auto;">
        Click Refresh to load ledger entries...
      </div>
    </div>

    <div style="margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1.5rem;">
      <div class="section-title">Diagnostics & Alerts</div>
      <button class="btn-danger" onclick="simulateSpike()">Simulate System Spike (SNS Alert)</button>
    </div>
  </div>

  <script>
    async function fetchProducts() {
      const listDiv = document.getElementById('product-list');
      try {
        const response = await fetch('/api/products');
        const data = await response.json();
        if (data.length === 0) {
          listDiv.innerHTML = '<p style="color:#94a3b8;">No products found in inventory.</p>';
          return;
        }
        
        let html = '';
        data.forEach(p => {
          const isOutOfStock = p.stock <= 0;
          const stockColor = isOutOfStock ? '#ef4444' : (p.stock < 5 ? '#f59e0b' : '#10b981');
          html += `
            <div class="product-card">
              <div class="product-info">
                <h4>${p.name}</h4>
                <p>Price: $${p.price.toFixed(2)} | Stock: <span style="color: ${stockColor}; font-weight: bold;">${p.stock}</span></p>
              </div>
              <div class="product-action">
                <input type="number" id="qty-${p.product_id}" class="quantity-input" value="1" min="1" max="${p.stock || 1}" ${isOutOfStock ? 'disabled' : ''}>
                <button class="buy-btn" onclick="placeOrder('${p.product_id}')" ${isOutOfStock ? 'disabled style="background: #334155; cursor: not-allowed;"' : ''}>
                  ${isOutOfStock ? 'Sold Out' : 'Buy'}
                </button>
              </div>
            </div>
          `;
        });
        listDiv.innerHTML = html;
      } catch (err) {
        listDiv.innerHTML = '<p style="color:#ef4444;">Failed to load catalog: ' + err.message + '</p>';
      }
    }

    async function placeOrder(productId) {
      const qtyInput = document.getElementById(`qty-${productId}`);
      const quantity = parseInt(qtyInput.value) || 1;
      const resultBox = document.getElementById('result-box');
      const resultData = document.getElementById('result-data');
      const resultTitle = document.getElementById('result-title');
      
      resultBox.style.display = 'block';
      resultTitle.innerText = "Submitting Order...";
      resultTitle.style.color = "#818cf8";
      resultData.innerText = "";

      try {
        const response = await fetch('/api/orders', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ product_id: productId, quantity })
        });

        const data = await response.json();
        
        if (response.ok) {
          resultTitle.innerText = `Order Created (PENDING) - ${data.product}`;
          resultTitle.style.color = "#10b981";
          resultData.innerText = JSON.stringify(data, null, 2);
          
          // Refresh products & transactions list
          fetchProducts();
          setTimeout(fetchTransactions, 2000);
        } else {
          throw new Error(data.error || 'Server error');
        }
      } catch (err) {
        resultTitle.innerText = "Failed to Place Order";
        resultTitle.style.color = "#ef4444";
        resultData.innerText = err.message;
      }
    }

    async function fetchTransactions() {
      const listDiv = document.getElementById('tx-list');
      listDiv.innerText = "Loading transactions...";
      try {
        const response = await fetch('/api/transactions');
        const data = await response.json();
        if (data.length === 0) {
          listDiv.innerText = "No transaction entries found.";
          return;
        }
        let html = '<table style="width:100%; border-collapse: collapse; margin-top:0.5rem;">';
        html += '<thead><tr style="border-bottom:1px solid #334155; color:#94a3b8; font-size:0.8rem;"><th style="padding:0.5rem 0; text-align:left;">TX ID</th><th style="padding:0.5rem 0; text-align:left;">STATUS</th><th style="padding:0.5rem 0; text-align:right;">AMOUNT</th></tr></thead><tbody>';
        data.forEach(tx => {
          const statusColor = tx.status === 'SUCCESS' ? '#10b981' : '#f59e0b';
          html += `<tr style="border-bottom:1px solid #1e293b;"><td style="padding:0.5rem 0; font-family:monospace;">${tx.transaction_id}</td><td style="padding:0.5rem 0; color:${statusColor}; font-weight:600; font-size:0.8rem;">${tx.status}</td><td style="padding:0.5rem 0; text-align:right;">$${tx.amount.toFixed(2)}</td></tr>`;
        });
        html += '</tbody></table>';
        listDiv.innerHTML = html;
      } catch (err) {
        listDiv.innerText = "Failed to load: " + err.message;
      }
    }

    async function simulateSpike() {
      const resultBox = document.getElementById('result-box');
      const resultData = document.getElementById('result-data');
      const resultTitle = document.getElementById('result-title');
      
      resultBox.style.display = 'block';
      resultTitle.innerText = "Simulating Spike...";
      resultTitle.style.color = "#f59e0b";
      resultData.innerText = "";

      try {
        const response = await fetch('/api/simulate-spike', {
          method: 'POST'
        });
        const data = await response.json();
        if (response.ok) {
          resultTitle.innerText = "Spike Simulated Successfully!";
          resultTitle.style.color = "#10b981";
          resultData.innerText = JSON.stringify(data, null, 2);
        } else {
          throw new Error(data.error || 'Server error');
        }
      } catch (err) {
        resultTitle.innerText = "Failed to Simulate Spike";
        resultTitle.style.color = "#ef4444";
        resultData.innerText = err.message;
      }
    }

    // Initial page load
    fetchProducts();
    fetchTransactions();
  </script>
</body>
</html>
