<!DOCTYPE html>
<html>
<head>
  <title>E-Commerce Cloud Platform - Shop</title>
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background: #090d16;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem 0;
    }
    .container {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      max-width: 800px;
      width: 90%;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    h1 {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    p.desc {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .auth-box {
      max-width: 400px;
      margin: 0 auto;
      background: #0f172a;
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid #1e293b;
    }
    .form-group {
      margin-bottom: 1.2rem;
      text-align: left;
    }
    label {
      display: block;
      color: #94a3b8;
      font-size: 0.8rem;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      padding: 0.7rem;
      border-radius: 6px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #f8fafc;
      box-sizing: border-box;
    }
    .btn {
      width: 100%;
      padding: 0.75rem;
      border-radius: 6px;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      color: white;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .nav-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 1rem;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
      text-align: left;
    }
    .product-card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.3s;
    }
    .product-card:hover {
      border-color: #38bdf8;
    }
    .product-image {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }
    .product-details {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }
    .product-title {
      font-size: 1rem;
      margin: 0 0 0.5rem 0;
      font-weight: 600;
    }
    .product-price {
      color: #38bdf8;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .product-stock {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 1rem;
    }
    .product-action {
      display: flex;
      gap: 0.5rem;
      margin-top: auto;
    }
    .quantity-input {
      width: 50px;
      padding: 0.4rem;
      border-radius: 6px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #f8fafc;
      text-align: center;
    }
    .buy-btn {
      flex-grow: 1;
      padding: 0.4rem;
      border-radius: 6px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .buy-btn:disabled {
      background: #334155;
      cursor: not-allowed;
    }
    .order-result {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      background: #0f172a;
      border: 1px solid #1e293b;
      display: none;
      text-align: left;
    }
    .order-result h3 {
      margin-top: 0;
      font-size: 1rem;
    }
    pre {
      margin: 0;
      font-family: monospace;
      font-size: 0.8rem;
      overflow-x: auto;
      color: #38bdf8;
    }
    .redirect-link {
      color: #818cf8;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .redirect-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="auth-panel" class="auth-box">
      <h2>Customer Login</h2>
      <p style="color: #94a3b8; font-size: 0.85rem; margin-bottom: 1.5rem;">Use credential <strong>user</strong> / <strong>user123</strong></p>
      <div id="login-error" style="color: #ef4444; font-size: 0.85rem; margin-bottom: 1rem; display: none;"></div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" value="user">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" value="user123">
      </div>
      <button class="btn" onclick="login()">Sign In</button>
      <div style="margin-top: 1.5rem;">
        <a class="redirect-link" href="/admin">Go to Admin Dashboard</a>
      </div>
    </div>

    <div id="shop-panel" style="display: none;">
      <div class="nav-header">
        <h1>Cloud E-Commerce Shop</h1>
        <div>
          <span id="user-display" style="margin-right: 1rem; color: #38bdf8;"></span>
          <button class="btn" style="width: auto; padding: 0.4rem 1rem; background: #ef4444;" onclick="logout()">Sign Out</button>
        </div>
      </div>

      <p class="desc">Welcome to our high-performance LocalStack/Minikube store front.</p>

      <div class="product-grid" id="product-list">
        <!-- Products load here -->
      </div>

      <div class="order-result" id="result-box">
        <h3 id="result-title">Order Status</h3>
        <pre id="result-data"></pre>
      </div>
    </div>
  </div>

  <script>
    let sessionToken = localStorage.getItem('user_token');
    let sessionUser = localStorage.getItem('user_username');

    if (sessionToken && sessionUser) {
      showShop();
    }

    async function login() {
      const usernameInput = document.getElementById('username').value;
      const passwordInput = document.getElementById('password').value;
      const errorDiv = document.getElementById('login-error');
      errorDiv.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: usernameInput, password: passwordInput })
        });
        const data = await res.json();
        if (res.ok) {
          if (data.role !== 'user') {
            throw new Error('Access denied. Customer credentials required.');
          }
          localStorage.setItem('user_token', data.token);
          localStorage.setItem('user_username', data.username);
          sessionToken = data.token;
          sessionUser = data.username;
          showShop();
        } else {
          throw new Error(data.error);
        }
      } catch (err) {
        errorDiv.innerText = err.message;
        errorDiv.style.display = 'block';
      }
    }

    function logout() {
      localStorage.removeItem('user_token');
      localStorage.removeItem('user_username');
      document.getElementById('shop-panel').style.display = 'none';
      document.getElementById('auth-panel').style.display = 'block';
    }

    function showShop() {
      document.getElementById('auth-panel').style.display = 'none';
      document.getElementById('shop-panel').style.display = 'block';
      document.getElementById('user-display').innerText = `Logged in: ${sessionUser}`;
      fetchProducts();
    }

    async function fetchProducts() {
      const listDiv = document.getElementById('product-list');
      listDiv.innerHTML = '<p style="color: #94a3b8;">Loading catalog...</p>';
      try {
        const res = await fetch('/api/products');
        const data = await res.json();
        let html = '';
        data.forEach(p => {
          const isOutOfStock = p.stock <= 0;
          const stockColor = isOutOfStock ? '#ef4444' : (p.stock < 5 ? '#f59e0b' : '#10b981');
          html += `
            <div class="product-card">
              <img class="product-image" src="${p.image || 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=300&q=80'}" alt="${p.name}">
              <div class="product-details">
                <h4 class="product-title">${p.name}</h4>
                <div class="product-price">$${p.price.toFixed(2)}</div>
                <div class="product-stock">Stock: <span style="color: ${stockColor}; font-weight: bold;">${p.stock}</span></div>
                <div class="product-action">
                  <input type="number" id="qty-${p.product_id}" class="quantity-input" value="1" min="1" max="${p.stock || 1}" ${isOutOfStock ? 'disabled' : ''}>
                  <button class="buy-btn" onclick="checkout('${p.product_id}')" ${isOutOfStock ? 'disabled' : ''}>
                    ${isOutOfStock ? 'Sold Out' : 'Checkout'}
                  </button>
                </div>
              </div>
            </div>
          `;
        });
        listDiv.innerHTML = html;
      } catch (err) {
        listDiv.innerHTML = '<p style="color: #ef4444;">Failed to load products</p>';
      }
    }

    async function checkout(productId) {
      const qtyInput = document.getElementById(`qty-${productId}`);
      const quantity = parseInt(qtyInput.value) || 1;
      const resultBox = document.getElementById('result-box');
      const resultData = document.getElementById('result-data');
      const resultTitle = document.getElementById('result-title');

      resultBox.style.display = 'block';
      resultTitle.innerText = "Submitting Order...";
      resultTitle.style.color = "#818cf8";
      resultData.innerText = "";

      try {
        // Step 1: Create Order (PENDING)
        const orderRes = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ product_id: productId, quantity })
        });
        const orderData = await orderRes.json();
        if (!orderRes.ok) throw new Error(orderData.error);

        resultTitle.innerText = "Processing Payment...";
        resultTitle.style.color = "#f59e0b";

        // Step 2: Pay via Payment Service
        const payRes = await fetch('/api/payments/charge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            orderId: orderData.orderId,
            amount: orderData.amount,
            product_id: productId,
            quantity
          })
        });
        const payData = await payRes.json();
        if (!payRes.ok) throw new Error(payData.error);

        // Success Output
        resultTitle.innerText = "Checkout Successful! (Paid)";
        resultTitle.style.color = "#10b981";
        resultData.innerText = JSON.stringify({ order: orderData, payment: payData }, null, 2);

        fetchProducts();
      } catch (err) {
        resultTitle.innerText = "Checkout Failed";
        resultTitle.style.color = "#ef4444";
        resultData.innerText = err.message;
      }
    }
  </script>
</body>
</html>
