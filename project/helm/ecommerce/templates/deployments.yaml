apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-frontend-html
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>E-Commerce Cloud Platform</title>
      <style>
        body {
          font-family: 'Outfit', sans-serif;
          background: #090d16;
          color: #f8fafc;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          margin: 0;
        }
        .container {
          background: rgba(30, 41, 59, 0.4);
          backdrop-filter: blur(10px);
          border-radius: 16px;
          padding: 3rem;
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
          max-width: 500px;
          width: 90%;
          text-align: center;
          border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
          background: linear-gradient(135deg, #38bdf8, #818cf8);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          margin-bottom: 0.5rem;
        }
        p.desc {
          color: #94a3b8;
          font-size: 0.95rem;
          margin-bottom: 2rem;
        }
        .form-group {
          margin-bottom: 1.5rem;
          text-align: left;
        }
        label {
          display: block;
          color: #94a3b8;
          font-size: 0.85rem;
          margin-bottom: 0.5rem;
          text-transform: uppercase;
          letter-spacing: 0.05em;
        }
        input {
          width: 100%;
          padding: 0.75rem;
          border-radius: 8px;
          background: #0f172a;
          border: 1px solid #334155;
          color: #f8fafc;
          box-sizing: border-box;
          font-size: 1rem;
        }
        button {
          width: 100%;
          padding: 0.85rem;
          border-radius: 8px;
          background: linear-gradient(135deg, #38bdf8, #6366f1);
          color: white;
          font-weight: 600;
          border: none;
          cursor: pointer;
          transition: all 0.3s ease;
        }
        button:hover {
          opacity: 0.9;
          transform: translateY(-2px);
        }
        .order-result {
          margin-top: 2rem;
          padding: 1rem;
          border-radius: 8px;
          background: #0f172a;
          border: 1px solid #1e293b;
          display: none;
          text-align: left;
        }
        .order-result h3 {
          margin-top: 0;
          color: #10b981;
        }
        pre {
          margin: 0;
          font-family: 'Courier New', Courier, monospace;
          font-size: 0.85rem;
          overflow-x: auto;
          color: #38bdf8;
        }
      </style>
    </head>
    <body>
      <div class="container">
        <h1>Cloud E-Commerce</h1>
        <p class="desc">LocalStack & Minikube Event-Driven Architecture Platform</p>
        
        <div class="form-group">
          <label>Purchase Amount ($)</label>
          <input type="number" id="amount" value="129.99" step="0.01">
        </div>
        
        <button onclick="placeOrder()">Place Order</button>

        <div class="order-result" id="result-box">
          <h3 id="result-title">Order Submitted!</h3>
          <pre id="result-data"></pre>
        </div>
      </div>

      <script>
        async function placeOrder() {
          const amount = parseFloat(document.getElementById('amount').value);
          const resultBox = document.getElementById('result-box');
          const resultData = document.getElementById('result-data');
          const resultTitle = document.getElementById('result-title');
          
          resultBox.style.display = 'block';
          resultTitle.innerText = "Submitting...";
          resultTitle.style.color = "#818cf8";
          resultData.innerText = "";

          try {
            const response = await fetch('/api/orders', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ amount })
            });

            const data = await response.json();
            
            if (response.ok) {
              resultTitle.innerText = "Order Created (PENDING)";
              resultTitle.style.color = "#10b981";
              resultData.innerText = JSON.stringify(data, null, 2);
            } else {
              throw new Error(data.error || 'Server error');
            }
          } catch (err) {
            resultTitle.innerText = "Failed to Place Order";
            resultTitle.style.color = "#ef4444";
            resultData.innerText = err.message;
          }
        }
      </script>
    </body>
    </html>
---
# 1. API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ecommerce-api
  labels:
    app: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
        imagePullPolicy: {{ .Values.api.image.pullPolicy }}
        command:
        - sh
        - -c
        - |
          mkdir -p /app && cp /code/api.js /app/api.js && cd /app
          npm install express @aws-sdk/client-dynamodb @aws-sdk/client-sns
          node api.js
        ports:
        - containerPort: 3000
        env:
        - name: AWS_ENDPOINT
          value: {{ .Values.environment.awsEndpoint | quote }}
        - name: AWS_REGION
          value: {{ .Values.environment.awsRegion | quote }}
        volumeMounts:
        - name: code-volume
          mountPath: /code
      volumes:
      - name: code-volume
        configMap:
          name: ecommerce-app-code
---
# 2. Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ecommerce-worker
  labels:
    app: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
        imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
        command:
        - sh
        - -c
        - |
          mkdir -p /app && cp /code/worker.js /app/worker.js && cd /app
          npm install @aws-sdk/client-sqs @aws-sdk/client-s3
          node worker.js
        env:
        - name: AWS_ENDPOINT
          value: {{ .Values.environment.awsEndpoint | quote }}
        - name: AWS_REGION
          value: {{ .Values.environment.awsRegion | quote }}
        volumeMounts:
        - name: code-volume
          mountPath: /code
      volumes:
      - name: code-volume
        configMap:
          name: ecommerce-app-code
---
# 3. Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ecommerce-frontend
  labels:
    app: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
        imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: ecommerce-frontend-html
