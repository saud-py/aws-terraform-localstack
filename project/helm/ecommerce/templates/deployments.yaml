apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-frontend-html
data:
  index.html: |
{{ .Files.Get "src/index.html" | indent 4 }}
---
# 1. API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ecommerce-api
  labels:
    app: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
        imagePullPolicy: {{ .Values.api.image.pullPolicy }}
        command:
        - sh
        - -c
        - |
          mkdir -p /app && cp /code/api.js /app/api.js && cd /app
          npm install express @aws-sdk/client-dynamodb @aws-sdk/client-sns @aws-sdk/client-secrets-manager
          node api.js
        ports:
        - containerPort: 3000
        env:
        - name: SECRETS_NAME
          value: "dev-ecommerce-secrets"
        - name: AWS_ENDPOINT
          value: {{ .Values.environment.awsEndpoint | quote }}
        - name: AWS_REGION
          value: {{ .Values.environment.awsRegion | quote }}
        - name: AWS_ACCESS_KEY_ID
          value: "mock_access_key"
        - name: AWS_SECRET_ACCESS_KEY
          value: "mock_secret_key"
        volumeMounts:
        - name: code-volume
          mountPath: /code
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "512Mi"
      volumes:
      - name: code-volume
        configMap:
          name: ecommerce-app-code
---
# 2. Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ecommerce-worker
  labels:
    app: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
        imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
        command:
        - sh
        - -c
        - |
          mkdir -p /app && cp /code/worker.js /app/worker.js && cd /app
          npm install @aws-sdk/client-sqs @aws-sdk/client-s3 @aws-sdk/client-dynamodb @aws-sdk/client-secrets-manager
          node worker.js
        env:
        - name: SECRETS_NAME
          value: "dev-ecommerce-secrets"
        - name: AWS_ENDPOINT
          value: {{ .Values.environment.awsEndpoint | quote }}
        - name: AWS_REGION
          value: {{ .Values.environment.awsRegion | quote }}
        - name: AWS_ACCESS_KEY_ID
          value: "mock_access_key"
        - name: AWS_SECRET_ACCESS_KEY
          value: "mock_secret_key"
        volumeMounts:
        - name: code-volume
          mountPath: /code
      volumes:
      - name: code-volume
        configMap:
          name: ecommerce-app-code
---
# 3. Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ecommerce-frontend
  labels:
    app: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
        imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: ecommerce-frontend-html
