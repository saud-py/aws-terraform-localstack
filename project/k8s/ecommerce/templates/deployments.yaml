# ── 5. Frontend (nginx) Deployment ──────────────────────────────────
# Serves: /, /style.css, /script.js  — multi-file static storefront
apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-nginx-frontend-conf
data:
  default.conf: |
    server {
      listen 80;
      root /usr/share/nginx/html;
      index index.html;
      location / {
        try_files $uri $uri/ /index.html;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ecommerce-frontend
  labels:
    app: frontend
    version: v2
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
        imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: html-volume
        configMap:
          name: ecommerce-frontend-html
      - name: nginx-conf
        configMap:
          name: ecommerce-nginx-frontend-conf
---
# ── 6. Admin (nginx) Deployment ─────────────────────────────────────
# Serves: /admin, /admin/style.css, /admin/script.js — dashboard UI
apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-nginx-admin-conf
data:
  default.conf: |
    server {
      listen 80;
      root /usr/share/nginx/html;
      index index.html;
      location /admin/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
      }
      location / {
        try_files $uri $uri/ /index.html;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ecommerce-admin
  labels:
    app: admin
    version: v2
spec:
  replicas: {{ .Values.admin.replicas }}
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
      - name: admin
        image: "{{ .Values.admin.image.repository }}:{{ .Values.admin.image.tag }}"
        imagePullPolicy: {{ .Values.admin.image.pullPolicy }}
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: html-volume
        configMap:
          name: ecommerce-admin-html
      - name: nginx-conf
        configMap:
          name: ecommerce-nginx-admin-conf
