# =====================================================================
# Deployments — E-Commerce Platform v2
# Services: api, worker, auth, payment, frontend (nginx), admin (nginx)
# =====================================================================

# ── 1. API Deployment ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ecommerce-api
  labels:
    app: api
    version: v2
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
        imagePullPolicy: {{ .Values.api.image.pullPolicy }}
        command:
        - sh
        - -c
        - |
          mkdir -p /app && cp /code/api.js /app/api.js && cd /app
          npm install express @aws-sdk/client-dynamodb @aws-sdk/client-sns @aws-sdk/client-sqs @aws-sdk/client-secrets-manager
          node api.js
        ports:
        - containerPort: 3000
        env:
        - name: SECRETS_NAME
          value: "dev-ecommerce-secrets"
        - name: AWS_ENDPOINT
          value: {{ .Values.environment.awsEndpoint | quote }}
        - name: AWS_REGION
          value: {{ .Values.environment.awsRegion | quote }}
        - name: AWS_ACCESS_KEY_ID
          value: "mock_access_key"
        - name: AWS_SECRET_ACCESS_KEY
          value: "mock_secret_key"
        volumeMounts:
        - name: code-volume
          mountPath: /code
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "512Mi"
      volumes:
      - name: code-volume
        configMap:
          name: ecommerce-api-code
---
