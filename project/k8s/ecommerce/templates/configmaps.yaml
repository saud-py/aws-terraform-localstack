{{/* ====================================================
     ConfigMaps — E-Commerce Platform v2
     Files.Get paths are relative to the chart root (k8s/ecommerce/).
     src/ directory is kept in sync from services/ via sync-src.sh.
     ====================================================== */}}

# ── 1. Backend Services Code (shared configmap) ──────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-api-code
data:
  api.js: |
{{ .Files.Get "src/api.js" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-auth-code
data:
  auth.js: |
{{ .Files.Get "src/auth.js" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-payment-code
data:
  payment.js: |
{{ .Files.Get "src/payment.js" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-worker-code
data:
  worker.js: |
{{ .Files.Get "src/worker.js" | indent 4 }}
---
# ── 2. Frontend Storefront (nginx — multi-file) ──────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-frontend-html
data:
  index.html: |
{{ .Files.Get "src/frontend/index.html" | indent 4 }}
  style.css: |
{{ .Files.Get "src/frontend/style.css" | indent 4 }}
  script.js: |
{{ .Files.Get "src/frontend/script.js" | indent 4 }}
---
# ── 3. Admin Dashboard (nginx — multi-file) ──────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-admin-html
data:
  index.html: |
{{ .Files.Get "src/admin/index.html" | indent 4 }}
  style.css: |
{{ .Files.Get "src/admin/style.css" | indent 4 }}
  script.js: |
{{ .Files.Get "src/admin/script.js" | indent 4 }}
